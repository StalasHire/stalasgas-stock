<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stala's Gas — Business Manager</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --ember:#d9590c;
    --ember-deep:#b9430a;
    --char:#241712;
    --char-soft:#3a2a22;
    --cream:#fbf2e6;
    --sand:#f0e1ca;
    --line:#e3cba8;
    --ok:#3f7d4f;
    --warn:#c98a1c;
    --danger:#b23a2e;
    --font-display:'Iowan Old Style','Georgia',serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:var(--font-body);background:var(--cream);color:var(--char);
    min-height:100vh;
  }
  .flame{font-size:1.1em;}
  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 30% 20%, #fff7ec 0%, var(--cream) 55%, var(--sand) 100%);
    padding:24px;
  }
  .login-card{
    background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:40px 36px;max-width:380px;width:100%;
    box-shadow:0 20px 50px -20px rgba(36,23,18,0.25);
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand-mark{
    width:40px;height:40px;border-radius:10px;background:linear-gradient(145deg,var(--ember),var(--ember-deep));
    display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;
  }
  .brand h1{font-family:var(--font-display);font-size:21px;margin:0;letter-spacing:0.3px;}
  .brand small{display:block;color:var(--char-soft);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
  .login-card h2{font-family:var(--font-display);font-size:17px;margin:24px 0 4px;color:var(--char-soft);font-weight:600;}
  .login-card p.sub{font-size:13px;color:#8a7565;margin:0 0 20px;}
  label{font-size:12px;font-weight:600;color:var(--char-soft);display:block;margin-bottom:5px;letter-spacing:0.3px;}
  input{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
    font-size:14px;margin-bottom:14px;background:#fffdfa;color:var(--char);
  }
  input:focus{outline:2px solid var(--ember);outline-offset:1px;border-color:var(--ember);}
  button.primary{
    width:100%;padding:12px;border:none;border-radius:9px;background:var(--ember);
    color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.2px;
    transition:background .15s ease;
  }
  button.primary:hover{background:var(--ember-deep);}
  button.primary:disabled{opacity:0.55;cursor:default;}
  #login-error{color:var(--danger);font-size:13px;margin-top:10px;display:none;}
  .login-tabs{display:flex;gap:0;margin:18px 0 16px;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .login-tab{flex:1;padding:9px;border:none;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#8a7565;}
  .login-tab.active{background:var(--ember);color:#fff;}
  .pin-row{display:flex;gap:10px;margin-top:6px;}
  .pin-box{width:52px;height:58px;text-align:center;font-size:22px;font-weight:700;border:2px solid var(--line);border-radius:10px;padding:0;}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100vh;}
  header.topbar{
    background:var(--char);color:var(--sand);display:flex;align-items:center;
    justify-content:space-between;padding:14px 22px;position:sticky;top:0;z-index:10;
  }
  header.topbar .brand{margin:0;}
  header.topbar .brand h1{color:#fff;}
  header.topbar .brand small{color:#caa97e;}
  .who{display:flex;align-items:center;gap:12px;}
  .who .role-pill{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;
    padding:4px 10px;border-radius:20px;background:var(--ember);color:#fff;
  }
  .who button{
    background:transparent;border:1px solid #5c473a;color:var(--sand);
    padding:7px 13px;border-radius:8px;font-size:13px;cursor:pointer;
  }
  .who button:hover{background:#3a2a22;}

  main{max-width:1100px;margin:0 auto;padding:26px 20px 60px;}
  .stat-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:26px;}
  .stat-card{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    flex:1;min-width:150px;
  }
  .stat-card .num{font-family:var(--font-display);font-size:28px;color:var(--ember-deep);}
  .stat-card .label{font-size:12px;color:#8a7565;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}

  .panel{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:22px;
  }
  .panel h2{font-family:var(--font-display);font-size:18px;margin:0 0 16px;color:var(--char);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:#8a7565;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:0.5px;padding:8px 10px;border-bottom:2px solid var(--line);}
  td{padding:10px 10px;border-bottom:1px solid #f0e6d6;}
  tr:hover td{background:#fdf8ef;}
  .status-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
  .status-Pending{background:#fbe8c8;color:var(--warn);}
  .status-Assigned{background:#e3edff;color:#2d5fae;}
  .status-OutforDelivery{background:#fde3c0;color:var(--ember-deep);}
  .status-Delivered{background:#e1f0e2;color:var(--ok);}
  .status-Cancelled{background:#f6dcd8;color:var(--danger);}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1/-1;}
  @media (max-width:680px){.form-grid{grid-template-columns:1fr;}}
  select{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
    font-size:14px;background:#fffdfa;color:var(--char);
  }
  .btn-small{padding:6px 12px;font-size:12px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;}
  .btn-small:hover{background:var(--sand);}
  .empty-state{color:#a08e7c;font-size:13px;padding:20px 0;text-align:center;}
  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--char);color:#fff;padding:13px 20px;
    border-radius:10px;font-size:13px;box-shadow:0 10px 30px -10px rgba(0,0,0,0.4);display:none;z-index:50;
  }
  .tab-nav{display:flex;gap:6px;margin-bottom:18px;border-bottom:2px solid var(--line);}
  .tab-btn{
    background:transparent;border:none;padding:10px 18px;font-size:14px;font-weight:600;
    color:#8a7565;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;
  }
  .tab-btn:hover{color:var(--char);}
  .tab-btn.active{color:var(--ember-deep);border-bottom-color:var(--ember);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">🔥</div>
      <div>
        <h1>Stala's Gas</h1>
        <small>Business Manager</small>
      </div>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-staff-btn">Staff</button>
      <button class="login-tab" id="tab-admin-btn">Admin</button>
    </div>

    <!-- STAFF PIN LOGIN -->
    <div id="staff-login">
      <label for="staff-select">Your name</label>
      <select id="staff-select">
        <option value="">Select your name…</option>
      </select>
      <label style="margin-top:12px;">PIN</label>
      <div class="pin-row">
        <input class="pin-box" id="p1" type="password" inputmode="numeric" maxlength="1">
        <input class="pin-box" id="p2" type="password" inputmode="numeric" maxlength="1">
        <input class="pin-box" id="p3" type="password" inputmode="numeric" maxlength="1">
        <input class="pin-box" id="p4" type="password" inputmode="numeric" maxlength="1">
      </div>
      <button class="primary" id="staff-login-btn" style="margin-top:16px;">Sign in</button>
    </div>

    <!-- ADMIN EMAIL LOGIN -->
    <div id="admin-login" style="display:none;">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" placeholder="you@stala.co.za" autocomplete="username">
      <label for="login-password">Password</label>
      <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="primary" id="login-btn" style="margin-top:4px;">Sign in</button>
    </div>

    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" style="width:32px;height:32px;font-size:16px;">🔥</div>
      <div><h1 style="font-size:17px;">Stala's Gas</h1></div>
    </div>
    <div class="who">
      <span id="who-name"></span>
      <span class="role-pill" id="who-role"></span>
      <button id="logout-btn">Log out</button>
    </div>
  </header>
  <main id="main-content">
    <div class="empty-state">Loading…</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
const SUPABASE_URL = "https://kaqrxufvvyljpdtnwowj.supabase.co";
const SUPABASE_KEY = "sb_publishable_FK3b49UnfyeMxKpcL0v92w_p0Lf5brf";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const EMAILJS_PUBLIC_KEY = "UuKKnY5gfgBQ3bq0";
const EMAILJS_SERVICE_ID = "service_8eq8kp4";
const EMAILJS_TEMPLATE_ID = "template_8oetxyw";
const WHATSAPP_NUMBER = "27725744458"; // 072 574 4458 in international format, no +
const NOTIFY_EMAIL = "info@stala.co.za";
emailjs.init(EMAILJS_PUBLIC_KEY);

const CYL_SIZES = ['3kg','5kg','7kg','9kg','14kg','19kg','48kg'];
const ORDER_TYPES = ['Exchange','Refill','Cylinder Only','Gas and Cylinder'];
const STATUSES = ['Pending','Assigned','Out for Delivery','Delivered','Cancelled'];

let currentProfile = null;
let priceList = {}; // { '9kg': 250.00, ... }

async function loadPrices(){
  const { data, error } = await sb.from('prices').select('*');
  if(!error && data){
    priceList = {};
    data.forEach(p => priceList[`${p.order_type}|${p.cylinder_size}`] = parseFloat(p.price));
  }
}

function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#b23a2e' : '#241712';
  t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 3200);
}

/* ============ AUTH ============ */

// Tab switching
document.getElementById('tab-staff-btn').addEventListener('click', ()=>{
  document.getElementById('staff-login').style.display='block';
  document.getElementById('admin-login').style.display='none';
  document.getElementById('tab-staff-btn').classList.add('active');
  document.getElementById('tab-admin-btn').classList.remove('active');
});
document.getElementById('tab-admin-btn').addEventListener('click', ()=>{
  document.getElementById('admin-login').style.display='block';
  document.getElementById('staff-login').style.display='none';
  document.getElementById('tab-admin-btn').classList.add('active');
  document.getElementById('tab-staff-btn').classList.remove('active');
});

// Load staff list into dropdown (non-admin profiles)
async function loadStaffDropdown(){
  const { data } = await sb.from('profiles').select('id, full_name, role').neq('role','admin').order('full_name');
  const sel = document.getElementById('staff-select');
  if(data && data.length){
    data.forEach(p=>{
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${p.full_name} (${p.role})`;
      sel.appendChild(opt);
    });
  }
}
loadStaffDropdown();

// PIN box auto-advance
['p1','p2','p3','p4'].forEach((id, i, arr)=>{
  const el = document.getElementById(id);
  el.addEventListener('input', ()=>{
    el.value = el.value.replace(/\D/g,'').slice(0,1);
    if(el.value && i < arr.length-1) document.getElementById(arr[i+1]).focus();
  });
  el.addEventListener('keydown', e=>{
    if(e.key==='Backspace' && !el.value && i > 0) document.getElementById(arr[i-1]).focus();
    if(e.key==='Enter') doStaffLogin();
  });
});

// Staff PIN login
document.getElementById('staff-login-btn').addEventListener('click', doStaffLogin);

async function doStaffLogin(){
  const profileId = document.getElementById('staff-select').value;
  const pin = ['p1','p2','p3','p4'].map(id=>document.getElementById(id).value).join('');
  const errEl = document.getElementById('login-error');
  errEl.style.display='none';
  if(!profileId){ errEl.textContent='Please select your name.'; errEl.style.display='block'; return; }
  if(pin.length !== 4){ errEl.textContent='Enter your 4-digit PIN.'; errEl.style.display='block'; return; }

  const btn = document.getElementById('staff-login-btn');
  btn.disabled=true; btn.textContent='Signing in…';

  // Look up their stored auth email
  const { data: profile, error: profErr } = await sb.from('profiles').select('auth_email').eq('id', profileId).single();
  if(profErr || !profile?.auth_email){
    btn.disabled=false; btn.textContent='Sign in';
    errEl.textContent = 'Account not found. Ask your admin to re-add you.';
    errEl.style.display='block';
    return;
  }

  const { data, error } = await sb.auth.signInWithPassword({ email: profile.auth_email, password: pin });
  btn.disabled=false; btn.textContent='Sign in';
  if(error){
    errEl.textContent = 'Incorrect PIN. Try again.';
    errEl.style.display='block';
    ['p1','p2','p3','p4'].forEach(id=>{ document.getElementById(id).value=''; });
    document.getElementById('p1').focus();
    return;
  }
  await loadProfileAndRoute();
}

// Admin email login
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if(!email || !password){ errEl.textContent = 'Enter your email and password.'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Sign in';
  if(error){
    errEl.textContent = error.message || 'Could not sign in. Check your details.';
    errEl.style.display = 'block';
    return;
  }
  await loadProfileAndRoute();
}

document.getElementById('logout-btn').addEventListener('click', async ()=>{
  await sb.auth.signOut();
  currentProfile = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
});

async function loadProfileAndRoute(){
  const { data: userData } = await sb.auth.getUser();
  if(!userData?.user){ return; }
  const { data: profile, error } = await sb
    .from('profiles')
    .select('*')
    .eq('id', userData.user.id)
    .single();

  if(error || !profile){
    showToast('No profile found for this account. Ask your admin to add you.', true);
    await sb.auth.signOut();
    return;
  }
  currentProfile = profile;
  await loadPrices();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('who-name').textContent = profile.full_name;
  document.getElementById('who-role').textContent = profile.role;
  routeToDashboard();
}

/* Restore session on page load */
sb.auth.getSession().then(({ data })=>{
  if(data?.session){ loadProfileAndRoute(); }
});

/* ============ ROUTING ============ */
function routeToDashboard(){
  if(currentProfile.role === 'admin') renderAdminDashboard();
  else if(currentProfile.role === 'sales') renderSalesDashboard();
  else if(currentProfile.role === 'driver') renderDriverDashboard();
}

/* ============ SHARED: ORDER FORM ============ */
function orderFormHTML(){
  return `
  <div class="panel">
    <h2>New order</h2>
    <div class="form-grid">
      <div><label>Customer name</label><input id="f-name" placeholder="e.g. Thandi Nkosi"></div>
      <div><label>Phone number</label><input id="f-phone" placeholder="e.g. 0821234567"></div>
      <div class="full"><label>Delivery address</label><input id="f-address" placeholder="e.g. 12 Voortrekker Rd, Bellville"></div>
      <div>
        <label>Order type</label>
        <select id="f-type"><option value="">Select</option>${ORDER_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
      </div>
      <div>
        <label>Cylinder size</label>
        <select id="f-size"><option value="">Select</option>${CYL_SIZES.map(s=>`<option>${s}</option>`).join('')}</select>
      </div>
      <div><label>Quantity</label><input id="f-qty" type="number" min="1" value="1"></div>
      <div><label>Amount (R)</label><input id="f-amount" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div>
        <label>Payment method</label>
        <select id="f-payment"><option value="">Select</option><option>Cash</option><option>EFT</option><option>Card</option></select>
      </div>
    </div>
    <button class="primary" style="margin-top:14px;max-width:220px;" id="save-order-btn">Save order</button>
    <div id="wa-send-box" style="margin-top:14px;"></div>
  </div>`;
}

function wireOrderForm(onSaved){
  const sizeEl = document.getElementById('f-size');
  const qtyEl = document.getElementById('f-qty');
  const amountEl = document.getElementById('f-amount');
  const typeEl = document.getElementById('f-type');

  function autoFillAmount(){
    const size = sizeEl.value;
    const type = typeEl.value;
    const qty = parseInt(qtyEl.value || '1', 10);
    const key = `${type}|${size}`;
    if(size && type && priceList[key] !== undefined){
      amountEl.value = (priceList[key] * qty).toFixed(2);
    }
  }
  sizeEl.addEventListener('change', autoFillAmount);
  typeEl.addEventListener('change', autoFillAmount);
  qtyEl.addEventListener('input', autoFillAmount);

  document.getElementById('save-order-btn').addEventListener('click', async ()=>{
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const type = document.getElementById('f-type').value;
    const size = document.getElementById('f-size').value;
    const qty = parseInt(document.getElementById('f-qty').value || '1', 10);
    const amount = parseFloat(document.getElementById('f-amount').value || '0');
    const payment = document.getElementById('f-payment').value;

    if(!name || !phone || !type || !size || !payment){
      showToast('Fill in customer name, phone, order type, cylinder size and payment method.', true);
      return;
    }

    // upsert customer
    let { data: existingCustomer } = await sb.from('customers').select('id').eq('phone', phone).maybeSingle();
    let customerId = existingCustomer?.id;
    if(!customerId){
      const { data: newCust, error: custErr } = await sb.from('customers')
        .insert({ name, phone, address }).select('id').single();
      if(custErr){ showToast('Could not save customer: ' + custErr.message, true); return; }
      customerId = newCust.id;
    }

    const { data: insertedOrder, error } = await sb.from('orders').insert({
      customer_id: customerId,
      customer_name: name,
      customer_phone: phone,
      delivery_address: address,
      order_type: type,
      cylinder_size: size,
      quantity: qty,
      amount: amount,
      payment_method: payment,
      status: 'Pending',
      created_by: currentProfile.id
    }).select('id').single();
    if(error){ showToast('Could not save order: ' + error.message, true); return; }
    showToast('Order saved.');
    const orderNum = 1000 + (insertedOrder?.id || 0);

    // Send automatic email notification
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      order_id: orderNum,
      customer_name: name,
      customer_phone: phone,
      delivery_address: address || 'N/A',
      order_type: type,
      cylinder_size: size,
      quantity: qty,
      amount: amount.toFixed(2),
      payment_method: payment,
      to_email: NOTIFY_EMAIL
    }).catch(()=>{ /* fail silently, order is already saved */ });

    // Build WhatsApp share link with order details
    const waText = encodeURIComponent(
      `New Stala's Gas order #${orderNum}:\n` +
      `Customer: ${name}\n` +
      `Phone: ${phone}\n` +
      `Address: ${address || 'N/A'}\n` +
      `Type: ${type}\n` +
      `Cylinder: ${qty} x ${size}\n` +
      `Amount: R${amount.toFixed(2)}\n` +
      `Payment: ${payment}`
    );
    const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${waText}`;
    const waBox = document.getElementById('wa-send-box');
    if(waBox){
      waBox.innerHTML = `<a href="${waLink}" target="_blank" class="primary" style="display:inline-block;text-decoration:none;text-align:center;padding:12px;border-radius:9px;background:#25D366;color:#fff;font-weight:700;max-width:240px;">Send order to WhatsApp</a>`;
    }

    onSaved && onSaved();
  });
}

/* ============ ADMIN DASHBOARD ============ */
/* ============ SHARED: CUSTOMER SEARCH ============ */
function customerSearchHTML(){
  return `
  <div class="panel">
    <h2>Customer lookup</h2>
    <p style="font-size:13px;color:#8a7565;margin-top:-8px;">Search by name or phone number to see a customer's full order history.</p>
    <input id="cust-search" placeholder="e.g. Thandi or 0821234567" style="margin-bottom:10px;">
    <div id="cust-results"></div>
  </div>`;
}

function wireCustomerSearch(){
  const input = document.getElementById('cust-search');
  const resultsEl = document.getElementById('cust-results');
  let timer;
  input.addEventListener('input', ()=>{
    clearTimeout(timer);
    timer = setTimeout(()=>runCustomerSearch(input.value.trim(), resultsEl), 350);
  });
}

async function runCustomerSearch(query, resultsEl){
  if(!query){ resultsEl.innerHTML = ''; return; }
  resultsEl.innerHTML = `<div class="empty-state">Searching…</div>`;

  const { data: customers, error } = await sb
    .from('customers')
    .select('*')
    .or(`name.ilike.%${query}%,phone.ilike.%${query}%`)
    .limit(10);

  if(error){ resultsEl.innerHTML = `<div class="empty-state">Search failed: ${error.message}</div>`; return; }
  if(!customers.length){ resultsEl.innerHTML = `<div class="empty-state">No customers found.</div>`; return; }

  resultsEl.innerHTML = customers.map(c => `
    <div class="cust-card" data-phone="${c.phone}" style="border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;">
      <strong>${c.name}</strong> — ${c.phone}
      ${c.address ? `<div style="font-size:12px;color:#8a7565;margin-top:2px;">${c.address}</div>` : ''}
      <div class="cust-orders" data-phone="${c.phone}" style="margin-top:10px;display:none;"></div>
    </div>
  `).join('');

  resultsEl.querySelectorAll('.cust-card').forEach(card=>{
    card.addEventListener('click', async ()=>{
      const phone = card.dataset.phone;
      const ordersEl = card.querySelector('.cust-orders');
      const isOpen = ordersEl.style.display === 'block';
      resultsEl.querySelectorAll('.cust-orders').forEach(el=>el.style.display='none');
      if(isOpen) return;

      ordersEl.innerHTML = `<div class="empty-state">Loading orders…</div>`;
      ordersEl.style.display = 'block';
      const { data: custOrders, error: ordErr } = await sb
        .from('orders')
        .select('*')
        .eq('customer_phone', phone)
        .order('created_at', { ascending:false });

      if(ordErr){ ordersEl.innerHTML = `<div class="empty-state">Could not load orders: ${ordErr.message}</div>`; return; }
      if(!custOrders.length){ ordersEl.innerHTML = `<div class="empty-state">No orders yet for this customer.</div>`; return; }

      const totalSpent = custOrders.reduce((sum,o)=> sum + (parseFloat(o.amount)||0), 0);
      ordersEl.innerHTML = `
        <div style="font-size:12px;color:#8a7565;margin-bottom:8px;">${custOrders.length} order(s) — R${totalSpent.toFixed(2)} total</div>
        <table>
          <thead><tr><th>ID</th><th>Date</th><th>Type</th><th>Cylinder</th><th>Qty</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody>
            ${custOrders.map(o=>`
              <tr>
                <td>#${1000+o.id}</td>
                <td>${new Date(o.created_at).toLocaleDateString()}</td>
                <td>${o.order_type}</td>
                <td>${o.cylinder_size}</td>
                <td>${o.quantity}</td>
                <td>R${parseFloat(o.amount||0).toFixed(2)}</td>
                <td><span class="status-pill status-${o.status.replace(/\s/g,'')}">${o.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    });
  });
}

          <div><label>Confirm PIN</label><input id="new-staff-pin2" type="password" inputmode="numeric" maxlength="4" placeholder="e.g. 1234" style="letter-spacing:6px;font-size:18px;"></div>

    <div class="tab-content" id="tab-prices" style="display:none;">
      <div class="panel">

                  return `<td><input type="number" min="0" class="stock-input" data-location="${loc}" data-size="${size}" value="${val}" style="width:70px;padding:6px 8px;"></td>`;

      if(btn.dataset.tab === 'reports') renderReports(orders);
      if(btn.dataset.tab === 'staff') loadStaffList();
    });
  });

  async function loadStaffList(){
    const el = document.getElementById('staff-list');
    if(!el) return;
    const { data, error } = await sb.from('profiles').select('*').neq('role','admin').order('full_name');
    if(error){ el.innerHTML=`<div class="empty-state">Could not load staff: ${error.message}</div>`; return; }
    if(!data.length){ el.innerHTML=`<div class="empty-state">No staff added yet.</div>`; return; }
    el.innerHTML=`
      <table>
        <thead><tr><th>Name</th><th>Role</th><th>Action</th></tr></thead>
        <tbody>
          ${data.map(p=>`
            <tr>
              <td>${p.full_name}</td>
              <td>${p.role}</td>
              <td><button class="btn-small remove-staff" data-id="${p.id}" data-name="${p.full_name}">Remove</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    el.querySelectorAll('.remove-staff').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        const id = e.target.dataset.id;
        const name = e.target.dataset.name;
        if(!confirm(`Remove ${name}? They will no longer be able to log in.`)) return;
        // Delete auth user via profile delete (cascade handles it)
        const { error } = await sb.from('profiles').delete().eq('id', id);
        if(error){ showToast('Could not remove: ' + error.message, true); return; }
        showToast(`${name} removed.`);
        loadStaffList();
      });
    });
  }

  document.getElementById('add-staff-btn').addEventListener('click', async ()=>{
    const name = document.getElementById('new-staff-name').value.trim();
    const role = document.getElementById('new-staff-role').value;
    const pin = document.getElementById('new-staff-pin').value;
    const pin2 = document.getElementById('new-staff-pin2').value;
    if(!name){ showToast('Enter a name.', true); return; }
    if(pin.length !== 4 || !/^\d{4}$/.test(pin)){ showToast('PIN must be exactly 4 digits.', true); return; }
    if(pin !== pin2){ showToast('PINs do not match.', true); return; }

    const btn = document.getElementById('add-staff-btn');
    btn.disabled=true; btn.textContent='Creating…';

    // Create Supabase auth user with internal email + PIN as password
    const slug = name.toLowerCase().replace(/\s+/g,'.').replace(/[^a-z0-9.]/g,'');
    const tempEmail = `staff.${slug}.${Date.now()}@stala.internal`;

    // Use signUp to create the auth user (works from client side)
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({
      email: tempEmail,
      password: pin,
      options: { data: { full_name: name } }
    });

    btn.disabled=false; btn.textContent='Add staff member';

    if(signUpErr){ showToast('Could not create login: ' + signUpErr.message, true); return; }

    const userId = signUpData.user?.id;
    if(!userId){ showToast('Account created but could not get user ID. Try again.', true); return; }

    // Insert profile with auth_email stored for PIN login
    const { error: profErr } = await sb.from('profiles').insert({
      id: userId,
      full_name: name,
      role: role,
      auth_email: tempEmail
    });
    if(profErr){ showToast('Login created but profile failed: ' + profErr.message, true); return; }

    showToast(`${name} added! They can now log in with PIN: ${pin}.`);
    document.getElementById('new-staff-name').value='';
    document.getElementById('new-staff-pin').value='';
    document.getElementById('new-staff-pin2').value='';
    loadStaffList();
    loadStaffDropdown(); // refresh login dropdown
  });

  document.getElementById('save-prices-btn').addEventListener('click', async ()=>{
    const inputs = document.querySelectorAll('.price-input');
    const updates = Array.from(inputs).map(i => ({
      order_type: i.dataset.type,
      cylinder_size: i.dataset.size,
      price: parseFloat(i.value || '0')
    }));
    for(const u of updates){
      const { error } = await sb.from('prices').upsert(u, { onConflict: 'order_type,cylinder_size' });
      if(error){ showToast('Could not save price for ' + u.order_type + ' ' + u.cylinder_size + ': ' + error.message, true); return; }
    }
    await loadPrices();
    showToast('Prices updated.');
  });

  document.getElementById('save-stock-btn').addEventListener('click', async ()=>{
    const inputs = document.querySelectorAll('.stock-input');
    for(const i of inputs){
      const location = i.dataset.location;
      const size = i.dataset.size;
      const newFull = parseInt(i.value || '0', 10);
      const existing = (stockRows||[]).find(r=>r.location===location && r.cylinder_size===size);
      const oldFull = existing ? existing.full_count : 0;

      const { error } = await sb.from('stock')
        .upsert({ location, cylinder_size: size, full_count: newFull, empty_count: existing?.empty_count || 0 }, { onConflict: 'location,cylinder_size' });
      if(error){ showToast(`Could not save stock for ${location} ${size}: ${error.message}`, true); return; }

      if(newFull !== oldFull){
        await sb.from('stock_movements').insert({
          moved_by: currentProfile.id,
          to_location: location,
          cylinder_size: size,
          full_qty: newFull - oldFull,
          note: `Manual stock update: ${oldFull} → ${newFull}`
        });
      }
    }
    showToast('Stock updated.');
    renderAdminDashboard();
  });
}

/* ============ REPORTS ============ */
function renderReports(orders){
  const el = document.getElementById('reports-content');
  if(!el) return;

  const now = new Date();
  const todayStr = now.toDateString();
  const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
  const monthAgo = new Date(now); monthAgo.setDate(monthAgo.getDate() - 30);

  const delivered = orders.filter(o=>o.status==='Delivered');
  const todayOrders = orders.filter(o=>new Date(o.created_at).toDateString()===todayStr);
  const weekOrders = orders.filter(o=>new Date(o.created_at)>=weekAgo);
  const monthOrders = orders.filter(o=>new Date(o.created_at)>=monthAgo);

  const rev = arr => arr.reduce((s,o)=>s+(parseFloat(o.amount)||0),0);

  // Orders by type
  const byType = {};
  ORDER_TYPES.forEach(t=>{ byType[t]={count:0,revenue:0}; });
  orders.forEach(o=>{
    if(byType[o.order_type]){
      byType[o.order_type].count++;
      byType[o.order_type].revenue += parseFloat(o.amount)||0;
    }
  });

  // Orders by cylinder size
  const bySize = {};
  CYL_SIZES.forEach(s=>{ bySize[s]={count:0,revenue:0}; });
  orders.forEach(o=>{
    if(bySize[o.cylinder_size]){
      bySize[o.cylinder_size].count++;
      bySize[o.cylinder_size].revenue += parseFloat(o.amount)||0;
    }
  });

  // Top 5 customers by spend
  const custSpend = {};
  orders.forEach(o=>{
    const k = o.customer_phone;
    if(!custSpend[k]) custSpend[k]={ name:o.customer_name, phone:o.customer_phone, total:0, count:0 };
    custSpend[k].total += parseFloat(o.amount)||0;
    custSpend[k].count++;
  });
  const topCustomers = Object.values(custSpend).sort((a,b)=>b.total-a.total).slice(0,5);

  el.innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${todayOrders.length}</div><div class="label">Orders today</div></div>
      <div class="stat-card"><div class="num">R${rev(todayOrders).toFixed(2)}</div><div class="label">Revenue today</div></div>
      <div class="stat-card"><div class="num">${weekOrders.length}</div><div class="label">Orders this week</div></div>
      <div class="stat-card"><div class="num">R${rev(weekOrders).toFixed(2)}</div><div class="label">Revenue this week</div></div>
      <div class="stat-card"><div class="num">${monthOrders.length}</div><div class="label">Orders this month</div></div>
      <div class="stat-card"><div class="num">R${rev(monthOrders).toFixed(2)}</div><div class="label">Revenue this month</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex-wrap:wrap;">
      <div class="panel">
        <h2>By order type</h2>
        <table>
          <thead><tr><th>Type</th><th>Orders</th><th>Revenue</th></tr></thead>
          <tbody>
            ${ORDER_TYPES.map(t=>`
              <tr>
                <td>${t}</td>
                <td>${byType[t].count}</td>
                <td>R${byType[t].revenue.toFixed(2)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="panel">
        <h2>By cylinder size</h2>
        <table>
          <thead><tr><th>Size</th><th>Orders</th><th>Revenue</th></tr></thead>
          <tbody>
            ${CYL_SIZES.map(s=>`
              <tr>
                <td>${s}</td>
                <td>${bySize[s].count}</td>
                <td>R${bySize[s].revenue.toFixed(2)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel" style="margin-top:0;">
      <h2>Top customers</h2>
      ${topCustomers.length ? `
      <table>
        <thead><tr><th>Customer</th><th>Phone</th><th>Orders</th><th>Total spent</th></tr></thead>
        <tbody>
          ${topCustomers.map(c=>`
            <tr>
              <td>${c.name}</td>
              <td>${c.phone}</td>
              <td>${c.count}</td>
              <td>R${c.total.toFixed(2)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>` : `<div class="empty-state">No orders yet.</div>`}
    </div>
  `;
}

/* ============ ORDERS TABLE ============ */
function renderOrdersTable(orders, canManage, drivers){
  drivers = drivers || [];
  const container = document.getElementById('orders-table');
  if(!orders.length){ container.innerHTML = `<div class="empty-state">No orders yet.</div>`; return; }
  container.innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>Customer</th><th>Phone</th><th>Type</th><th>Cylinder</th><th>Qty</th><th>Amount</th><th>Status</th>${canManage?'<th>Action</th><th>Driver</th>':''}
      </tr></thead>
      <tbody>
        ${orders.map(o=>`
          <tr data-id="${o.id}">
            <td>#${1000+o.id}</td>
            <td>${o.customer_name}</td>
            <td>${o.customer_phone}</td>
            <td>${o.order_type}</td>
            <td>${o.cylinder_size}</td>
            <td>${o.quantity}</td>
            <td>R${parseFloat(o.amount||0).toFixed(2)}</td>
            <td><span class="status-pill status-${o.status.replace(/\s/g,'')}">${o.status}</span></td>
            ${canManage ? `<td>
              <select class="status-select" data-id="${o.id}">
                ${STATUSES.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join('')}
              </select>
            </td>
            <td>
              <select class="driver-select" data-id="${o.id}" ${drivers.length===0 ? 'disabled title="No drivers added yet"' : ''}>
                <option value="">${drivers.length===0 ? 'No drivers yet' : 'Unassigned'}</option>
                ${drivers.map(d=>`<option value="${d.id}" ${o.assigned_driver===d.id?'selected':''}>${d.full_name}</option>`).join('')}
              </select>
            </td>` : ''}
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  if(canManage){
    container.querySelectorAll('.status-select').forEach(sel=>{
      sel.addEventListener('change', async (e)=>{
        const id = e.target.dataset.id;
        const newStatus = e.target.value;
        const { error } = await sb.from('orders').update({ status: newStatus }).eq('id', id);
        if(error){ showToast('Could not update status: ' + error.message, true); }
        else showToast(`Order #${1000+parseInt(id)} marked ${newStatus}.`);
      });
    });
    container.querySelectorAll('.driver-select').forEach(sel=>{
      sel.addEventListener('change', async (e)=>{
        const id = e.target.dataset.id;
        const driverId = e.target.value || null;
        const updates = { assigned_driver: driverId };
        if(driverId) updates.status = 'Assigned';
        const { error } = await sb.from('orders').update(updates).eq('id', id);
        if(error){ showToast('Could not assign driver: ' + error.message, true); }
        else showToast(`Order #${1000+parseInt(id)} assigned.`);
      });
    });
  }
}

/* ============ DRIVER DASHBOARD ============ */

  main.innerHTML = `<div class="empty-state">Loading your deliveries…</div>`;
  const { data: orders, error } = await sb.from('orders')
    .select('*')
    .eq('assigned_driver', currentProfile.id)
    .neq('status', 'Delivered')
    .neq('status', 'Cancelled')
    .order('created_at', { ascending:true });

  if(error){ main.innerHTML = `<div class="empty-state">Could not load deliveries: ${error.message}</div>`; return; }

  main.innerHTML = `
    <div class="panel">
      <h2>Your deliveries today</h2>
      <div id="driver-orders"></div>
    </div>
  `;
  const container = document.getElementById('driver-orders');
  if(!orders.length){
    container.innerHTML = `<div class="empty-state">No deliveries assigned to you right now.</div>`;
    return;
  }
  container.innerHTML = orders.map(o=>`
    <div style="border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>#${1000+o.id} — ${o.customer_name}</strong>
        <span class="status-pill status-${o.status.replace(/\s/g,'')}">${o.status}</span>
      </div>
      <div style="font-size:13px;color:#6b5a4a;margin-top:4px;">${o.delivery_address || 'No address on file'} · ${o.customer_phone}</div>
      <div style="font-size:13px;margin-top:4px;">${o.order_type} — ${o.quantity} × ${o.cylinder_size}</div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="btn-small mark-out" data-id="${o.id}">Out for delivery</button>
        <button class="btn-small mark-delivered" data-id="${o.id}">Mark delivered</button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.mark-out').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      const id = e.target.dataset.id;
      await sb.from('orders').update({ status:'Out for Delivery' }).eq('id', id);
      showToast('Marked out for delivery.');
      renderDriverDashboard();
    });
  });
  container.querySelectorAll('.mark-delivered').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      const id = e.target.dataset.id;
      await sb.from('orders').update({ status:'Delivered', delivered_at: new Date().toISOString() }).eq('id', id);
      showToast('Marked delivered.');
      renderDriverDashboard();
    });
  });
}
</script>
</body>
</html>
