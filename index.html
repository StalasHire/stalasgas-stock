<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stala'sGas Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
padding:20px;
background:#f4f4f4;
}

header{
background:#ff6600;
color:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.1);
}

.card h2{
margin:0;
font-size:32px;
color:#ff6600;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

th{
background:#ff6600;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
background:#28a745;
color:white;
padding:8px 14px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<header>

<h1>🔥 STALA'S GAS</h1>

<p>Business Management Dashboard</p>

</header>

<div class="stats">

<div class="card">
<h2 id="totalOrders">0</h2>
<p>Total Orders</p>
</div>

<div class="card">
<h2 id="totalRevenue">R0.00</h2>
<p>Total Revenue</p>
</div>

</div>

<h2>Customer Orders</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Customer</th>
<th>Phone</th>
<th>Order Type</th>
<th>Cylinder</th>
<th>Qty</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

<script src="app.js"></script>

</body>
</html>
